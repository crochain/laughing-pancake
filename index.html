<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crochet Toy Shop</title>

<style>
body {
  font-family: Arial;
  background: #f9f9f9;
  margin: 0;
}

header {
  background: #ffb6c1;
  padding: 15px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
}

.container {
  padding: 20px;
  display: flex;
  gap: 20px;
  justify-content: center;
}

.product {
  background: white;
  padding: 15px;
  border-radius: 10px;
  width: 250px;
  text-align: center;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  background: #ff69b4;
  color: white;
  border: none;
  border-radius: 5px;
}

.cart {
  background: white;
  padding: 15px;
  margin: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>🧸 Crochet Toy Shop</header>

<div class="container">

  <div class="product">
    <h3>Crochet Bear</h3>
    <select id="bear">
      <option value="Small - 150">Small - ₱150</option>
      <option value="Medium - 250">Medium - ₱250</option>
      <option value="Large - 350">Large - ₱350</option>
    </select>
    <button onclick="addToCart('Crochet Bear', 'bear')">Add to Cart</button>
  </div>

  <div class="product">
    <h3>Crochet Bunny</h3>
    <select id="bunny">
      <option value="Small - 120">Small - ₱120</option>
      <option value="Medium - 220">Medium - ₱220</option>
      <option value="Large - 320">Large - ₱320</option>
    </select>
    <button onclick="addToCart('Crochet Bunny', 'bunny')">Add to Cart</button>
  </div>

</div>

<div class="cart">
  <h3>🛒 Cart</h3>
  <ul id="cartList"></ul>
  <p><b>Total: ₱<span id="total">0</span></b></p>

  <h4>Customer Info</h4>
  <input type="text" id="name" placeholder="Your Name"><br><br>
  <input type="text" id="address" placeholder="Address"><br><br>

  <button onclick="placeOrder()">Place Order</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyDZYMNVHcptSb4opfQROW2-gUUuaffX9Fw",
  authDomain: "crochetshop-dd1bd.firebaseapp.com",
  projectId: "crochetshop-dd1bd",
  storageBucket: "crochetshop-dd1bd.firebasestorage.app",
  messagingSenderId: "1060151558141",
  appId: "1:1060151558141:web:0faca4ff3eaaed48e46394",
  measurementId: "G-T85N4LCH5D"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart = [];
let total = 0;

window.addToCart = function(product, selectId) {
  const value = document.getElementById(selectId).value;
  const [size, price] = value.split(" - ");

  cart.push({ product, size, price: parseInt(price) });
  total += parseInt(price);

  displayCart();
}

function displayCart() {
  const list = document.getElementById("cartList");
  list.innerHTML = "";

  cart.forEach(item => {
    list.innerHTML += `<li>${item.product} (${item.size}) - ₱${item.price}</li>`;
  });

  document.getElementById("total").innerText = total;
}


window.placeOrder = async function() {
  const name = document.getElementById("name").value;
  const address = document.getElementById("address").value;

  if (!name || !address || cart.length === 0) {
    alert("Complete your order!");
    return;
  }

  try {
    await addDoc(collection(db, "orders"), {
      name: name,
      address: address,
      items: cart,
      total: total,
      date: new Date().toString()
    });

    alert("✅ Order saved!");

    
    cart = [];
    total = 0;
    displayCart();
    document.getElementById("name").value = "";
    document.getElementById("address").value = "";

  } catch (error) {
    alert("❌ Error: " + error);
    console.log(error);
  }
}
</script>

</body>
</html></html>
